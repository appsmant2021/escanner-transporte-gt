<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escanear Código - Transporte GT</title>
    <!-- Quagga2 para códigos de barras 1D (Code 128, EAN, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
    <!-- jsQR como respaldo para QR -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }
        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 300px;
        }
        #scannerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #scannerCanvas { display: none; }
        
        /* Marco de escaneo más grande para códigos de barras */
        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 120px;
            pointer-events: none;
            z-index: 10;
        }
        .scan-frame::before,
        .scan-frame::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            border-color: #00ff88;
            border-style: solid;
        }
        .scan-frame::before {
            top: 0;
            left: 0;
            border-width: 3px 0 0 3px;
            border-radius: 6px 0 0 0;
        }
        .scan-frame::after {
            bottom: 0;
            right: 0;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 6px 0;
        }
        .corner-tr {
            position: absolute;
            top: 0;
            right: 0;
            width: 25px;
            height: 25px;
            border-color: #00ff88;
            border-style: solid;
            border-width: 3px 3px 0 0;
            border-radius: 0 6px 0 0;
        }
        .corner-bl {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 25px;
            height: 25px;
            border-color: #00ff88;
            border-style: solid;
            border-width: 0 0 3px 3px;
            border-radius: 0 0 0 6px;
        }
        .scan-line {
            position: absolute;
            left: 8px;
            right: 8px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ff88, transparent);
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.8);
            animation: moveLine 2s ease-in-out infinite;
            top: 50%;
        }
        @keyframes moveLine {
            0%, 100% { top: 15%; }
            50% { top: 85%; }
        }
        .bottom-panel {
            background: #1a1a2e;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .status-text {
            color: #ccc;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }
        .btn-close {
            background: #d63031;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-close:active { transform: scale(0.96); opacity: 0.9; }
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .permission-box {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }
        .permission-box h3 { color: #0072c6; margin-bottom: 10px; font-size: 18px; }
        .permission-box p { color: #636e72; font-size: 13px; margin-bottom: 15px; line-height: 1.5; }
        .permission-box small { font-size: 11px; color: #999; display: block; margin-top: 10px; }
        .btn-allow {
            background: linear-gradient(135deg, #0072c6, #005a9e);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-allow:active { transform: scale(0.96); }
        .error-text { color: #d63031; font-size: 12px; display: none; margin-top: 10px; }
        .error-text.show { display: block; }
        
        .debug-info {
            color: #888;
            font-size: 10px;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="scanner-container">
        <div class="permission-overlay" id="permissionOverlay">
            <div class="permission-box">
                <h3>📷 Activar Cámara</h3>
                <p>Presiona el botón para iniciar el escáner.<br><small>Apunta al código de barras horizontalmente.</small></p>
                <button class="btn-allow" id="btnAllow" onclick="iniciarEscanner()">Iniciar Escáner</button>
                <small id="errorText" class="error-text"></small>
            </div>
        </div>
        <div class="video-wrapper">
            <video id="scannerVideo" autoplay playsinline muted></video>
            <canvas id="scannerCanvas"></canvas>
            <div class="scan-frame">
                <div class="corner-tr"></div>
                <div class="corner-bl"></div>
                <div class="scan-line"></div>
            </div>
        </div>
        <div class="bottom-panel">
            <div class="status-text" id="statusText">Esperando activación...</div>
            <button class="btn-close" onclick="cerrarVentana()">Cancelar</button>
            <div class="debug-info" id="debugInfo"></div>
        </div>
    </div>

    <script>
        var scannerStream = null;
        var scannerAnimFrame = null;
        var escaneando = false;
        var barcodeDetector = null;
        var usandoQuagga = false;
        var ultimoCodigo = '';
        var tiempoUltimoCodigo = 0;

        // Intentar BarcodeDetector nativo (mejor para 1D en Chrome/Edge)
        if (window.BarcodeDetector) {
            barcodeDetector = new BarcodeDetector({
                formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'qr_code']
            }).then(function(detector) {
                console.log('✅ BarcodeDetector listo');
                document.getElementById('debugInfo').textContent = 'Motor: BarcodeDetector nativo';
            }).catch(function(e) {
                console.warn('BarcodeDetector falló:', e);
                barcodeDetector = null;
            });
        }

        function iniciarEscanner() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                document.getElementById('errorText').textContent = '❌ Navegador no soportado. Use Chrome o Edge.';
                document.getElementById('errorText').classList.add('show');
                return;
            }
            document.getElementById('errorText').classList.remove('show');
            document.getElementById('statusText').textContent = '📷 Solicitando permiso de cámara...';

            var constraints = {
                video: {
                    facingMode: { ideal: 'environment' },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 },
                    focusMode: 'continuous'
                },
                audio: false
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    scannerStream = stream;
                    document.getElementById('permissionOverlay').style.display = 'none';
                    arrancarVideo(stream);
                })
                .catch(function(err) {
                    var mensaje = '';
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        mensaje = '🚫 Permiso denegado. Android: Ajustes → Apps → Navegador → Permisos → Cámara';
                    } else if (err.name === 'NotFoundError') {
                        mensaje = '📷 No se encontró cámara.';
                    } else if (err.name === 'NotReadableError') {
                        mensaje = '⚠️ Cámara en uso por otra app.';
                    } else {
                        mensaje = '❌ Error: ' + (err.message || 'desconocido');
                    }
                    document.getElementById('errorText').textContent = mensaje;
                    document.getElementById('errorText').classList.add('show');
                    document.getElementById('statusText').textContent = 'Error al acceder a la cámara';
                });
        }

        function arrancarVideo(stream) {
            var video = document.getElementById('scannerVideo');
            video.srcObject = stream;
            video.setAttribute('playsinline', '');
            video.setAttribute('muted', '');
            document.getElementById('statusText').textContent = '📷 Enfocando... acerque el código';

            video.onloadedmetadata = function() {
                video.play().then(function() {
                    escaneando = true;
                    
                    // Intentar Quagga2 primero (especialista en Code 128)
                    if (!barcodeDetector && typeof Quagga !== 'undefined') {
                        iniciarQuagga();
                    } else {
                        // Usar loop manual con BarcodeDetector o jsQR
                        loopEscaneo();
                    }
                }).catch(function(e) {
                    document.getElementById('statusText').textContent = 'Error al iniciar video';
                    console.error(e);
                });
            };
        }

        // ==================== QUAGGA2 (especialista en Code 128) ====================
        function iniciarQuagga() {
            usandoQuagga = true;
            document.getElementById('debugInfo').textContent = 'Motor: Quagga2 (Code 128)';
            
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('.video-wrapper'),
                    constraints: {
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                },
                locator: {
                    patchSize: "medium",
                    halfSample: true
                },
                numOfWorkers: 2,
                frequency: 10,
                decoder: {
                    readers: [
                        "code_128_reader",
                        "code_39_reader",
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader",
                        "upc_e_reader"
                    ]
                },
                locate: true
            }, function(err) {
                if (err) {
                    console.error('Quagga init error:', err);
                    document.getElementById('debugInfo').textContent = 'Quagga falló, usando jsQR';
                    usandoQuagga = false;
                    loopEscaneo();
                    return;
                }
                Quagga.start();
                document.getElementById('statusText').textContent = '📷 Escaneando código de barras...';
            });

            Quagga.onDetected(function(result) {
                if (result && result.codeResult && result.codeResult.code) {
                    var codigo = result.codeResult.code;
                    console.log('✅ Quagga detectó:', codigo, 'Formato:', result.codeResult.format);
                    
                    // Evitar lecturas duplicadas en menos de 2 segundos
                    var ahora = Date.now();
                    if (codigo === ultimoCodigo && (ahora - tiempoUltimoCodigo) < 2000) {
                        return;
                    }
                    ultimoCodigo = codigo;
                    tiempoUltimoCodigo = ahora;
                    
                    codigoDetectado(codigo);
                }
            });
        }

        // ==================== LOOP MANUAL (BarcodeDetector o jsQR) ====================
        function loopEscaneo() {
            if (!escaneando || usandoQuagga) return;
            var video = document.getElementById('scannerVideo');
            var canvas = document.getElementById('scannerCanvas');

            if (video.readyState < video.HAVE_ENOUGH_DATA || video.videoWidth === 0) {
                scannerAnimFrame = requestAnimationFrame(loopEscaneo);
                return;
            }
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Opción 1: BarcodeDetector nativo
            if (barcodeDetector) {
                barcodeDetector.then(function(detector) {
                    if (!escaneando) return;
                    detector.detect(canvas).then(function(barcodes) {
                        if (barcodes && barcodes.length > 0) {
                            var codigo = barcodes[0].rawValue;
                            console.log('✅ BarcodeDetector encontró:', codigo);
                            codigoDetectado(codigo);
                        } else {
                            // También intentar con jsQR para QR
                            escanearConJsQR(ctx, canvas);
                        }
                    }).catch(function() {
                        escanearConJsQR(ctx, canvas);
                    });
                });
            } else {
                escanearConJsQR(ctx, canvas);
            }
        }

        function escanearConJsQR(ctx, canvas) {
            if (!escaneando) return;
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var code = jsQR(imageData.data, imageData.width, imageData.height, {
                inversionAttempts: 'dontInvert'
            });
            if (code && code.data) {
                console.log('✅ jsQR encontró:', code.data);
                codigoDetectado(code.data);
            } else {
                scannerAnimFrame = requestAnimationFrame(loopEscaneo);
            }
        }

        function codigoDetectado(texto) {
            escaneando = false;
            detenerCamara();
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            document.getElementById('statusText').textContent = '✅ Detectado: ' + texto.trim();

            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({
                        tipo: 'codigoEscaneado',
                        codigo: texto.trim()
                    }, '*');
                }
            } catch (e) {
                console.log('No se pudo enviar a ventana padre:', e);
            }

            setTimeout(function() { window.close(); }, 1000);
        }

        function detenerCamara() {
            if (usandoQuagga && typeof Quagga !== 'undefined') {
                try { Quagga.stop(); } catch(e) {}
            }
            usandoQuagga = false;
            
            if (scannerAnimFrame) {
                cancelAnimationFrame(scannerAnimFrame);
                scannerAnimFrame = null;
            }
            if (scannerStream) {
                scannerStream.getTracks().forEach(function(track) { track.stop(); });
                scannerStream = null;
            }
        }

        function cerrarVentana() {
            detenerCamara();
            window.close();
        }

        window.addEventListener('beforeunload', function() { detenerCamara(); });
        
        // Mostrar overlay al cargar
        document.getElementById('permissionOverlay').style.display = 'flex';
    </script>
</body>
</html>
