<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escanear Código - Transporte GT</title>
    <!-- Quagga2 para códigos de barras lineales (Code 128, EAN, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
    <!-- jsQR como respaldo para QR codes -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        #scannerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 80px;
            border: 2px solid #00ff88;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,255,136,0.3);
        }
        .scan-label {
            position: absolute;
            top: -28px;
            left: 0;
            right: 0;
            text-align: center;
            color: #00ff88;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0,255,136,0.5);
        }
        .scan-line {
            position: absolute;
            left: 5px;
            right: 5px;
            height: 2px;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: scanMove 1.5s ease-in-out infinite;
        }
        @keyframes scanMove {
            0%, 100% { top: 10%; }
            50% { top: 90%; }
        }
        .bottom-panel {
            background: #1a1a2e;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .status-text {
            color: #ccc;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
        }
        .btn-close, .btn-manual {
            flex: 1;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .btn-close { background: #d63031; }
        .btn-manual { background: #f39c12; }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .overlay-box {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            max-width: 320px;
            width: 90%;
        }
        .overlay-box h3 { color: #0072c6; margin-bottom: 10px; font-size: 18px; }
        .overlay-box p { color: #636e72; font-size: 13px; margin-bottom: 15px; }
        .btn-allow {
            background: #0072c6;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-text { color: #d63031; font-size: 12px; display: none; margin-top: 10px; }
        .error-text.show { display: block; }
        .debug-info { color: #888; font-size: 10px; text-align: center; margin-top: 4px; }
        .modal-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 30;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }
        .modal-box h4 { color: #f39c12; margin-bottom: 10px; }
        .modal-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #0072c6;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            margin-bottom: 12px;
        }
        .modal-box .btn-enviar {
            background: #0072c6;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 25px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="overlay" id="permissionOverlay">
        <div class="overlay-box">
            <h3>📷 Activar Cámara</h3>
            <p>Presiona para escanear.<br><small>Coloca el código DENTRO del rectángulo verde. Mantenlo firme 2 segundos.</small></p>
            <button class="btn-allow" onclick="iniciarEscanner()">Iniciar Escáner</button>
            <small id="errorText" class="error-text"></small>
        </div>
    </div>

    <div class="modal-overlay" id="manualModal">
        <div class="modal-box">
            <h4>✏️ Ingresar Código Manualmente</h4>
            <input type="text" id="manualCode" placeholder="Ej: 464" inputmode="numeric" autocomplete="off">
            <button class="btn-enviar" onclick="enviarCodigoManual()">Enviar Código</button>
            <button class="btn-close" style="width:100%;margin-top:8px;" onclick="document.getElementById('manualModal').classList.remove('show')">Cancelar</button>
        </div>
    </div>

    <div class="video-wrapper" id="videoWrapper">
        <video id="scannerVideo" autoplay playsinline muted></video>
        <div class="scan-frame">
            <div class="scan-label">📷 Coloque el código aquí</div>
            <div class="scan-line"></div>
        </div>
    </div>
    <div class="bottom-panel">
        <div class="status-text" id="statusText">Presione "Iniciar Escáner"</div>
        <div class="btn-row">
            <button class="btn-manual" onclick="mostrarEntradaManual()">⌨️ Manual</button>
            <button class="btn-close" onclick="cerrarVentana()">Cancelar</button>
        </div>
        <div class="debug-info" id="debugInfo"></div>
    </div>

    <script>
        var scannerStream = null;
        var escaneando = false;
        var usandoQuagga = false;
        var usandoBarcodeDetector = false;
        var barcodeDetector = null;
        
        // Sistema de validación: requiere 2 lecturas iguales en menos de 3 segundos
        var lecturas = [];
        var ultimoCodigoEnviado = '';
        var tiempoUltimoEnvio = 0;

        function iniciarEscanner() {
            var errorText = document.getElementById('errorText');
            errorText.classList.remove('show');
            document.getElementById('statusText').textContent = '📷 Solicitando cámara...';
            document.getElementById('debugInfo').textContent = '';

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                errorText.textContent = '❌ Use Chrome o Edge en Android.';
                errorText.classList.add('show');
                return;
            }

            // Prioridad 1: BarcodeDetector nativo (Chrome/Edge moderno)
            if (window.BarcodeDetector) {
                try {
                    barcodeDetector = new BarcodeDetector({
                        formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'qr_code']
                    });
                    usandoBarcodeDetector = true;
                    document.getElementById('debugInfo').textContent = 'Motor: BarcodeDetector nativo ✅';
                } catch(e) {
                    barcodeDetector = null;
                    usandoBarcodeDetector = false;
                }
            }

            // Prioridad 2: Quagga2 para códigos lineales
            if (!usandoBarcodeDetector && typeof Quagga !== 'undefined') {
                usandoQuagga = true;
                document.getElementById('debugInfo').textContent = 'Motor: Quagga2 (Code 128, EAN)';
            } else if (!usandoBarcodeDetector) {
                document.getElementById('debugInfo').textContent = 'Motor: jsQR (respaldo básico)';
            }

            var constraints = {
                video: {
                    facingMode: { ideal: 'environment' },
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                },
                audio: false
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    scannerStream = stream;
                    var video = document.getElementById('scannerVideo');
                    video.srcObject = stream;
                    video.setAttribute('playsinline', '');
                    video.setAttribute('muted', '');

                    video.onloadedmetadata = function() {
                        video.play().then(function() {
                            document.getElementById('permissionOverlay').style.display = 'none';
                            document.getElementById('statusText').textContent = '📷 Escaneando... mantenga firme el código';
                            escaneando = true;
                            lecturas = [];

                            if (usandoBarcodeDetector) {
                                loopBarcodeDetector();
                            } else if (usandoQuagga) {
                                iniciarQuagga();
                            } else {
                                loopJsQR();
                            }
                        }).catch(function(err) {
                            errorText.textContent = 'Error al reproducir: ' + err.message;
                            errorText.classList.add('show');
                            document.getElementById('statusText').textContent = 'Error al iniciar video';
                        });
                    };
                })
                .catch(function(err) {
                    var mensaje = '';
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        mensaje = '🚫 Permiso denegado.\nAndroid: Ajustes → Apps → Navegador → Permisos → Cámara → Permitir';
                    } else if (err.name === 'NotFoundError') {
                        mensaje = '📷 No se encontró cámara.';
                    } else {
                        mensaje = '❌ Error: ' + (err.message || err.name);
                    }
                    errorText.textContent = mensaje;
                    errorText.classList.add('show');
                    document.getElementById('statusText').textContent = 'Error';
                });
        }

        // ==================== MÉTODO 1: BarcodeDetector nativo ====================
        function loopBarcodeDetector() {
            if (!escaneando || !barcodeDetector) return;

            var video = document.getElementById('scannerVideo');
            if (video.readyState < 2 || video.videoWidth === 0) {
                requestAnimationFrame(loopBarcodeDetector);
                return;
            }

            barcodeDetector.detect(video)
                .then(function(barcodes) {
                    if (barcodes && barcodes.length > 0) {
                        var codigo = barcodes[0].rawValue.trim();
                        validarYEnviar(codigo);
                    }
                    if (escaneando) requestAnimationFrame(loopBarcodeDetector);
                })
                .catch(function() {
                    if (escaneando) requestAnimationFrame(loopBarcodeDetector);
                });
        }

        // ==================== MÉTODO 2: Quagga2 (códigos lineales) ====================
        function iniciarQuagga() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.getElementById('videoWrapper'),
                    constraints: {
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                },
                locator: {
                    patchSize: "medium",
                    halfSample: true
                },
                numOfWorkers: 2,
                frequency: 10,
                decoder: {
                    readers: [
                        "code_128_reader",
                        "code_39_reader",
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader",
                        "upc_e_reader"
                    ]
                },
                locate: true
            }, function(err) {
                if (err) {
                    console.error('Quagga error:', err);
                    document.getElementById('debugInfo').textContent = 'Quagga falló, usando jsQR';
                    usandoQuagga = false;
                    loopJsQR();
                    return;
                }
                Quagga.start();
            });

            Quagga.onDetected(function(result) {
                if (!escaneando) return;
                if (result && result.codeResult && result.codeResult.code) {
                    var codigo = result.codeResult.code.trim();
                    validarYEnviar(codigo);
                }
            });
        }

        // ==================== MÉTODO 3: jsQR (respaldo) ====================
        function loopJsQR() {
            if (!escaneando) return;

            var video = document.getElementById('scannerVideo');
            if (video.readyState < 2 || video.videoWidth === 0) {
                requestAnimationFrame(loopJsQR);
                return;
            }

            try {
                var canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                var ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                
                var code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: 'dontInvert'
                });
                
                if (code && code.data) {
                    validarYEnviar(code.data.trim());
                    return;
                }
            } catch(e) {}
            
            requestAnimationFrame(loopJsQR);
        }

        // ==================== SISTEMA DE VALIDACIÓN ====================
        function validarYEnviar(codigo) {
            if (!codigo || codigo.length === 0) return;
            
            var ahora = Date.now();
            
            // Evitar enviar el mismo código 2 veces en menos de 3 segundos
            if (codigo === ultimoCodigoEnviado && (ahora - tiempoUltimoEnvio) < 3000) {
                return;
            }
            
            // Agregar lectura a la lista
            lecturas.push({ codigo: codigo, tiempo: ahora });
            
            // Limpiar lecturas viejas (más de 2 segundos)
            lecturas = lecturas.filter(function(l) { return (ahora - l.tiempo) < 2000; });
            
            // Contar cuántas veces aparece este código en las lecturas recientes
            var coincidencias = lecturas.filter(function(l) { return l.codigo === codigo; }).length;
            
            // Necesitamos al menos 2 lecturas iguales para aceptar
            if (coincidencias >= 2) {
                ultimoCodigoEnviado = codigo;
                tiempoUltimoEnvio = ahora;
                codigoDetectado(codigo);
            } else {
                // Mostrar que se detectó algo pero esperando confirmación
                document.getElementById('statusText').textContent = '📷 Detectando: ' + codigo + ' (confirmando...)';
            }
        }

        function codigoDetectado(texto) {
            escaneando = false;
            
            // Detener Quagga si está activo
            if (usandoQuagga && typeof Quagga !== 'undefined') {
                try { Quagga.stop(); } catch(e) {}
            }
            
            if (scannerStream) {
                scannerStream.getTracks().forEach(function(t) { t.stop(); });
                scannerStream = null;
            }
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

            document.getElementById('statusText').textContent = '✅ Detectado: ' + texto;

            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({
                        tipo: 'codigoEscaneado',
                        codigo: texto
                    }, '*');
                }
            } catch(e) {}

            setTimeout(function() { window.close(); }, 1200);
        }

        function mostrarEntradaManual() {
            document.getElementById('manualModal').classList.add('show');
            document.getElementById('manualCode').focus();
        }

        function enviarCodigoManual() {
            var codigo = document.getElementById('manualCode').value.trim();
            if (!codigo) return;
            document.getElementById('manualModal').classList.remove('show');
            codigoDetectado(codigo);
        }

        function cerrarVentana() {
            escaneando = false;
            if (usandoQuagga && typeof Quagga !== 'undefined') {
                try { Quagga.stop(); } catch(e) {}
            }
            if (scannerStream) {
                scannerStream.getTracks().forEach(function(t) { t.stop(); });
                scannerStream = null;
            }
            window.close();
        }

        window.addEventListener('beforeunload', function() {
            if (usandoQuagga && typeof Quagga !== 'undefined') {
                try { Quagga.stop(); } catch(e) {}
            }
            if (scannerStream) {
                scannerStream.getTracks().forEach(function(t) { t.stop(); });
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            var inputManual = document.getElementById('manualCode');
            if (inputManual) {
                inputManual.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        enviarCodigoManual();
                    }
                });
            }
        });

        document.getElementById('permissionOverlay').style.display = 'flex';
    </script>
</body>
</html>
