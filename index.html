<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escanear Código - Transporte GT</title>
    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.2/dist/quagga.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }
        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 300px;
        }
        #scannerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 80px;
            pointer-events: none;
            z-index: 10;
            border: 2px dashed #00ff88;
            border-radius: 8px;
        }
        .scan-label {
            position: absolute;
            top: -30px;
            left: 0;
            right: 0;
            text-align: center;
            color: #00ff88;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0,255,136,0.5);
        }
        .scan-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0,255,136,0.8);
            animation: moveLine 1.5s ease-in-out infinite;
            top: 50%;
        }
        @keyframes moveLine {
            0%, 100% { top: 10%; }
            50% { top: 90%; }
        }
        .bottom-panel {
            background: #1a1a2e;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        .status-text {
            color: #ccc;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .btn-close, .btn-manual {
            flex: 1;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .btn-close { background: #d63031; }
        .btn-manual { background: #f39c12; }
        .btn-close:active, .btn-manual:active { transform: scale(0.96); opacity: 0.9; }
        .permission-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .permission-box {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            max-width: 320px;
            width: 90%;
        }
        .permission-box h3 { color: #0072c6; margin-bottom: 10px; font-size: 18px; }
        .permission-box p { color: #636e72; font-size: 13px; margin-bottom: 15px; line-height: 1.5; }
        .permission-box small { font-size: 11px; color: #999; display: block; margin-top: 10px; }
        .btn-allow {
            background: linear-gradient(135deg, #0072c6, #005a9e);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-allow:active { transform: scale(0.96); }
        .error-text { color: #d63031; font-size: 12px; display: none; margin-top: 10px; }
        .error-text.show { display: block; }
        .debug-info { color: #888; font-size: 10px; text-align: center; }
        
        /* Modal de entrada manual */
        .modal-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 30;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }
        .modal-box h4 { color: #f39c12; margin-bottom: 10px; }
        .modal-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #0072c6;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            margin-bottom: 12px;
        }
        .modal-box .btn-enviar {
            background: #0072c6;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 25px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="scanner-container">
        <div class="permission-overlay" id="permissionOverlay">
            <div class="permission-box">
                <h3>📷 Activar Cámara</h3>
                <p>Presiona para escanear.<br><small>Coloca el código DENTRO del rectángulo verde.</small></p>
                <button class="btn-allow" onclick="iniciarEscanner()">Iniciar Escáner</button>
                <small id="errorText" class="error-text"></small>
            </div>
        </div>
        
        <!-- Modal de entrada manual -->
        <div class="modal-overlay" id="manualModal">
            <div class="modal-box">
                <h4>✏️ Ingresar Código Manualmente</h4>
                <input type="text" id="manualCode" placeholder="Ej: 464" inputmode="numeric">
                <button class="btn-enviar" onclick="enviarCodigoManual()">Enviar Código</button>
                <button class="btn-close" style="width:100%;margin-top:8px;" onclick="document.getElementById('manualModal').classList.remove('show')">Cancelar</button>
            </div>
        </div>

        <div class="video-wrapper">
            <video id="scannerVideo" autoplay playsinline muted></video>
            <div class="scan-frame">
                <div class="scan-label">Coloque el código aquí</div>
                <div class="scan-line"></div>
            </div>
        </div>
        <div class="bottom-panel">
            <div class="status-text" id="statusText">Esperando activación...</div>
            <div class="btn-row">
                <button class="btn-manual" onclick="mostrarEntradaManual()">⌨️ Manual</button>
                <button class="btn-close" onclick="cerrarVentana()">Cancelar</button>
            </div>
            <div class="debug-info" id="debugInfo"></div>
        </div>
    </div>

    <script>
        var scannerStream = null;
        var escaneando = false;
        var ultimoCodigo = '';
        var tiempoUltimoCodigo = 0;

        function iniciarEscanner() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                document.getElementById('errorText').textContent = '❌ Use Chrome o Edge en Android.';
                document.getElementById('errorText').classList.add('show');
                return;
            }
            document.getElementById('errorText').classList.remove('show');
            document.getElementById('statusText').textContent = '📷 Solicitando cámara...';

            var constraints = {
                video: {
                    facingMode: { ideal: 'environment' },
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                },
                audio: false
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    scannerStream = stream;
                    document.getElementById('permissionOverlay').style.display = 'none';
                    iniciarQuagga();
                })
                .catch(function(err) {
                    var mensaje = '';
                    if (err.name === 'NotAllowedError') {
                        mensaje = '🚫 Permiso denegado. Vaya a Ajustes del navegador → Permisos → Cámara → Permitir.';
                    } else {
                        mensaje = '❌ Error: ' + (err.message || 'desconocido');
                    }
                    document.getElementById('errorText').textContent = mensaje;
                    document.getElementById('errorText').classList.add('show');
                    document.getElementById('statusText').textContent = 'Error al acceder a la cámara';
                });
        }

        function iniciarQuagga() {
            document.getElementById('debugInfo').textContent = 'Motor: Quagga2 (búsqueda intensiva)';
            document.getElementById('statusText').textContent = '📷 Buscando código... acerque la cámara';

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('.video-wrapper'),
                    constraints: {
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                },
                locator: {
                    patchSize: "small",
                    halfSample: false
                },
                numOfWorkers: 4,
                frequency: 10,
                decoder: {
                    readers: [
                        "code_128_reader",
                        "code_39_reader",
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader",
                        "upc_e_reader",
                        "code_93_reader",
                        "codabar_reader"
                    ],
                    multiple: false
                },
                locate: true
            }, function(err) {
                if (err) {
                    console.error('Quagga error:', err);
                    document.getElementById('debugInfo').textContent = 'Error Quagga: ' + err.message;
                    document.getElementById('statusText').textContent = '❌ Error al iniciar escáner';
                    return;
                }
                Quagga.start();
                escaneando = true;
            });

            var detecciones = 0;
            
            Quagga.onDetected(function(result) {
                if (!escaneando) return;
                
                if (result && result.codeResult && result.codeResult.code) {
                    var codigo = result.codeResult.code.trim();
                    var confianza = result.codeResult.confidence || 0;
                    
                    console.log('Detección #' + (++detecciones) + ': ' + codigo + ' (confianza: ' + confianza + ')');
                    document.getElementById('debugInfo').textContent = 
                        'Detecciones: ' + detecciones + ' | Último: ' + codigo + ' (' + Math.round(confianza * 100) + '%)';
                    
                    // Aceptar con confianza > 0.5 para ser más permisivos
                    if (confianza > 0.5 && /^[a-zA-Z0-9\-\.\/\s]+$/.test(codigo)) {
                        var ahora = Date.now();
                        if (codigo === ultimoCodigo && (ahora - tiempoUltimoCodigo) < 2500) {
                            return;
                        }
                        ultimoCodigo = codigo;
                        tiempoUltimoCodigo = ahora;
                        
                        codigoDetectado(codigo);
                    }
                }
            });

            Quagga.onProcessed(function(result) {
                if (result && result.boxes && result.boxes.length > 0) {
                    document.getElementById('statusText').textContent = '📷 Detectando patrón...';
                }
            });
        }

        function codigoDetectado(texto) {
            escaneando = false;
            detenerTodo();
            
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
            document.getElementById('statusText').textContent = '✅ Detectado: ' + texto;

            try {
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage({
                        tipo: 'codigoEscaneado',
                        codigo: texto
                    }, '*');
                }
            } catch (e) {
                console.log('Error enviando:', e);
            }

            setTimeout(function() { window.close(); }, 1200);
        }

        function mostrarEntradaManual() {
            document.getElementById('manualModal').classList.add('show');
            document.getElementById('manualCode').focus();
        }

        function enviarCodigoManual() {
            var codigo = document.getElementById('manualCode').value.trim();
            if (!codigo) return;
            document.getElementById('manualModal').classList.remove('show');
            codigoDetectado(codigo);
        }

        function detenerTodo() {
            if (typeof Quagga !== 'undefined') {
                try { Quagga.stop(); } catch(e) {}
            }
            if (scannerStream) {
                scannerStream.getTracks().forEach(function(t) { t.stop(); });
                scannerStream = null;
            }
        }

        function cerrarVentana() {
            detenerTodo();
            window.close();
        }

        window.addEventListener('beforeunload', function() { detenerTodo(); });

        // Permitir tecla Enter en entrada manual
        document.addEventListener('DOMContentLoaded', function() {
            var inputManual = document.getElementById('manualCode');
            if (inputManual) {
                inputManual.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        enviarCodigoManual();
                    }
                });
            }
        });

        document.getElementById('permissionOverlay').style.display = 'flex';
    </script>
</body>
</html>
