<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Escanear Código - Transporte GT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }
        .scanner-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
        }
        .video-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        #scannerVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            height: 100px;
            pointer-events: none;
            z-index: 10;
            border: 2px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,255,136,0.3);
        }
        .scan-label {
            position: absolute;
            top: -25px;
            left: 0;
            right: 0;
            text-align: center;
            color: #00ff88;
            font-size: 12px;
            font-weight: bold;
        }
        .bottom-panel {
            background: #1a1a2e;
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }
        .status-text {
            color: #ccc;
            font-size: 13px;
            text-align: center;
            min-height: 20px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }
        .btn-close, .btn-manual {
            flex: 1;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }
        .btn-close { background: #d63031; }
        .btn-manual { background: #f39c12; }
        .permission-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .permission-box {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            max-width: 320px;
            width: 90%;
        }
        .permission-box h3 { color: #0072c6; margin-bottom: 10px; font-size: 18px; }
        .permission-box p { color: #636e72; font-size: 13px; margin-bottom: 15px; line-height: 1.5; }
        .btn-allow {
            background: linear-gradient(135deg, #0072c6, #005a9e);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .error-text { color: #d63031; font-size: 12px; display: none; margin-top: 10px; }
        .error-text.show { display: block; }
        .debug-info { color: #666; font-size: 10px; text-align: center; margin-top: 4px; }
        
        .modal-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 30;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            max-width: 300px;
            width: 90%;
        }
        .modal-box h4 { color: #f39c12; margin-bottom: 10px; }
        .modal-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #0072c6;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            margin-bottom: 12px;
        }
        .modal-box .btn-enviar {
            background: #0072c6;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 25px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="scanner-container">
        <div class="permission-overlay" id="permissionOverlay">
            <div class="permission-box">
                <h3>📷 Activar Cámara</h3>
                <p>Presiona el botón para iniciar el escáner.<br><small>Coloca el código DENTRO del rectángulo verde.</small></p>
                <button class="btn-allow" onclick="iniciarEscanner()">Iniciar Escáner</button>
                <small id="errorText" class="error-text"></small>
            </div>
        </div>
        
        <div class="modal-overlay" id="manualModal">
            <div class="modal-box">
                <h4>✏️ Ingresar Código Manualmente</h4>
                <input type="text" id="manualCode" placeholder="Ej: 464" inputmode="numeric">
                <button class="btn-enviar" onclick="enviarCodigoManual()">Enviar Código</button>
                <button class="btn-close" style="width:100%;margin-top:8px;" onclick="document.getElementById('manualModal').classList.remove('show')">Cancelar</button>
            </div>
        </div>

        <div class="video-wrapper" id="videoWrapper">
            <video id="scannerVideo" autoplay playsinline muted loop></video>
            <div class="scan-frame">
                <div class="scan-label">📷 Código aquí</div>
            </div>
        </div>
        <div class="bottom-panel">
            <div class="status-text" id="statusText">Presione "Iniciar Escáner"</div>
            <div class="btn-row">
                <button class="btn-manual" onclick="mostrarEntradaManual()">⌨️ Manual</button>
                <button class="btn-close" onclick="cerrarVentana()">Cancelar</button>
            </div>
            <div class="debug-info" id="debugInfo"></div>
        </div>
    </div>

    <script>
        var scannerStream = null;
        var escaneando = false;
        var framesProcesados = 0;
        var ultimoCodigo = '';
        var tiempoUltimoCodigo = 0;
        var barcodeDetectorInstance = null;

        function iniciarEscanner() {
            var errorText = document.getElementById('errorText');
            errorText.classList.remove('show');
            errorText.textContent = '';
            
            document.getElementById('statusText').textContent = '📷 Solicitando cámara...';
            document.getElementById('debugInfo').textContent = '';

            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                errorText.textContent = '❌ Use Chrome o Edge en Android.';
                errorText.classList.add('show');
                return;
            }

            var constraints = {
                video: {
                    facingMode: { ideal: 'environment' },
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                },
                audio: false
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    console.log('✅ Cámara obtenida exitosamente');
                    scannerStream = stream;
                    
                    var video = document.getElementById('scannerVideo');
                    
                    // Configurar el video ANTES de asignar el stream
                    video.setAttribute('playsinline', '');
                    video.setAttribute('muted', '');
                    video.setAttribute('autoplay', '');
                    video.srcObject = stream;
                    
                    document.getElementById('statusText').textContent = '📷 Cámara lista. Iniciando escaneo...';
                    
                    // Esperar a que el video esté listo
                    video.onloadedmetadata = function() {
                        console.log('✅ Metadatos cargados, intentando reproducir...');
                        
                        // Intentar reproducir
                        var playPromise = video.play();
                        
                        if (playPromise !== undefined) {
                            playPromise.then(function() {
                                console.log('✅ Video reproduciéndose');
                                document.getElementById('permissionOverlay').style.display = 'none';
                                document.getElementById('statusText').textContent = '📷 Escaneando... mantenga el código firme';
                                escaneando = true;
                                framesProcesados = 0;
                                loopEscaneo();
                            }).catch(function(err) {
                                console.error('❌ Error al reproducir video:', err);
                                document.getElementById('statusText').textContent = 'Error al iniciar video: ' + err.message;
                                errorText.textContent = 'Error: ' + err.message + '. Intente recargar la página.';
                                errorText.classList.add('show');
                            });
                        }
                    };
                    
                    // Timeout de seguridad: si en 5 segundos no se ha iniciado, mostrar error
                    setTimeout(function() {
                        if (!escaneando && document.getElementById('permissionOverlay').style.display !== 'none') {
                            document.getElementById('statusText').textContent = 'Timeout: no se pudo iniciar el video';
                            errorText.textContent = '⏱️ Timeout. Cierre la ventana e intente de nuevo.';
                            errorText.classList.add('show');
                        }
                    }, 5000);
                    
                })
                .catch(function(err) {
                    console.error('❌ Error getUserMedia:', err);
                    var mensaje = '';
                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        mensaje = '🚫 Permiso de cámara denegado.\n\nPara arreglarlo:\n1. Abra Ajustes de Android\n2. Apps → Chrome/Brave\n3. Permisos → Cámara → Permitir';
                    } else if (err.name === 'NotFoundError') {
                        mensaje = '📷 No se encontró cámara en este dispositivo.';
                    } else if (err.name === 'NotReadableError') {
                        mensaje = '⚠️ La cámara está siendo usada por otra aplicación.';
                    } else {
                        mensaje = '❌ Error: ' + (err.message || err.name);
                    }
                    errorText.textContent = mensaje;
                    errorText.classList.add('show');
                    document.getElementById('statusText').textContent = 'Error al acceder a la cámara';
                });
        }

        function loopEscaneo() {
            if (!escaneando) {
                console.log('⏹ Loop detenido: escaneando=false');
                return;
            }
            
            var video = document.getElementById('scannerVideo');
            
            if (!video || video.readyState < 2 || video.videoWidth === 0) {
                console.log('⏳ Video no listo, reintentando... readyState=' + (video ? video.readyState : 'null'));
                requestAnimationFrame(loopEscaneo);
                return;
            }

            framesProcesados++;
            
            // Actualizar info cada 30 frames
            if (framesProcesados % 30 === 0) {
                document.getElementById('debugInfo').textContent = 
                    'Frames: ' + framesProcesados + ' | ' + video.videoWidth + 'x' + video.videoHeight;
            }

            // Intentar con BarcodeDetector nativo (Chrome/Edge)
            if (window.BarcodeDetector) {
                if (!barcodeDetectorInstance) {
                    try {
                        barcodeDetectorInstance = new BarcodeDetector({
                            formats: ['code_128', 'code_39', 'ean_13', 'ean_8', 'upc_a', 'upc_e', 'qr_code']
                        });
                        console.log('✅ BarcodeDetector creado');
                    } catch(e) {
                        console.log('⚠️ BarcodeDetector no soportado');
                        barcodeDetectorInstance = null;
                    }
                }
                
                if (barcodeDetectorInstance) {
                    barcodeDetectorInstance.then(function(detector) {
                        if (!escaneando) return;
                        detector.detect(video).then(function(barcodes) {
                            if (barcodes && barcodes.length > 0) {
                                var codigo = barcodes[0].rawValue.trim();
                                console.log('✅ CÓDIGO DETECTADO:', codigo);
                                
                                var ahora = Date.now();
                                if (codigo === ultimoCodigo && (ahora - tiempoUltimoCodigo) < 2000) {
                                    requestAnimationFrame(loopEscaneo);
                                    return;
                                }
                                ultimoCodigo = codigo;
                                tiempoUltimoCodigo = ahora;
                                
                                codigoDetectado(codigo);
                                return;
                            }
                            requestAnimationFrame(loopEscaneo);
                        }).catch(function(err) {
                            console.log('Error detect:', err);
                            requestAnimationFrame(loopEscaneo);
                        });
                    }).catch(function() {
                        requestAnimationFrame(loopEscaneo);
                    });
                    return;
                }
            }
            
            // Fallback: intentar con jsQR cada 10 frames
            if (framesProcesados % 10 === 0 && typeof jsQR !== 'undefined') {
                try {
                    var canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    var code = jsQR(imageData.data, imageData.width, imageData.height, {
                        inversionAttempts: 'dontInvert'
                    });
                    
                    if (code && code.data) {
                        console.log('✅ jsQR detectó:', code.data);
                        codigoDetectado(code.data);
                        return;
                    }
                } catch(e) {
                    console.log('Error jsQR:', e);
                }
            }
            
            requestAnimationFrame(loopEscaneo);
        }

        function codigoDetectado(texto) {
            console.log('🎯 codigoDetectado llamado con:', texto);
            escaneando = false;
            
            if (scannerStream) {
                scannerStream.getTracks().forEach(function(t) { t.stop(); });
                scannerStream = null;
            }
            
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }
            
            document.getElementById('statusText').textContent = '✅ Detectado: ' + texto;
            document.getElementById('debugInfo').textContent = 'Total frames: ' + framesProcesados;

            try {
                if (window.opener && !window.opener.closed) {
                    console.log('📤 Enviando código a ventana padre...');
                    window.opener.postMessage({
                        tipo: 'codigoEscaneado',
                        codigo: texto
                    }, '*');
                }
            } catch (e) {
                console.log('Error enviando:', e);
            }

            setTimeout(function() {
                console.log('🔒 Cerrando ventana...');
                window.close();
            }, 1500);
        }

        function mostrarEntradaManual() {
            document.getElementById('manualModal').classList.add('show');
            document.getElementById('manualCode').focus();
        }

        function enviarCodigoManual() {
            var codigo = document.getElementById('manualCode').value.trim();
            if (!codigo) return;
            document.getElementById('manualModal').classList.remove('show');
            codigoDetectado(codigo);
        }

        function cerrarVentana() {
            escaneando = false;
            if (scannerStream) {
                scannerStream.getTracks().forEach(function(t) { t.stop(); });
                scannerStream = null;
            }
            window.close();
        }

        window.addEventListener('beforeunload', function() {
            escaneando = false;
            if (scannerStream) {
                scannerStream.getTracks().forEach(function(t) { t.stop(); });
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            var inputManual = document.getElementById('manualCode');
            if (inputManual) {
                inputManual.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        enviarCodigoManual();
                    }
                });
            }
        });

        document.getElementById('permissionOverlay').style.display = 'flex';
        console.log('🚀 Escáner listo. Esperando clic en "Iniciar Escáner"');
    </script>
</body>
</html>
